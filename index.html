<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Functions Lab</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top right, #1e1b4b, #020617);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-primary: #06b6d4;
            --accent-secondary: #3b82f6;
            --accent-pink: #f472b6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            line-height: 1.6;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            margin-bottom: 3rem;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            gap: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 2.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 20px rgba(6, 182, 212, 0.1);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        h2::before {
            content: 'f()';
            font-family: monospace;
            font-size: 0.9rem;
            background: rgba(6, 182, 212, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--accent-primary);
        }

        button {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3);
            margin-bottom: 2rem;
            width: fit-content;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(6, 182, 212, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        .result-display {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-main);
            position: relative;
        }

        /* Specific ID styles for consistency with old classes */
        #saludar, #resultado, #resultadoReturn {
            border-left: 4px solid var(--accent-pink);
            transition: all 0.3s ease;
        }

        #saludar:not(:empty), #resultado:not(:empty), #resultadoReturn:not(:empty) {
            color: var(--accent-pink);
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.2);
        }

        .metodo-return {
            border-top: none; /* Removing old border-top style */
        }

        @media (max-width: 640px) {
            body {
                padding: 2rem 1rem;
            }
            .card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <h1>Funciones JS Lab</h1>

    <div class="main-container">
        <!-- Ejercicio 1 -->
        <div class="card section" id="section1">
            <h2>Ejercicio 1: Saludar</h2>
            <button onclick="arrancarSaludar()">Ejecutar Saludo</button>
            <div class="result-display saludar" id="saludar">Esperando entrada...</div>
        </div>

        <!-- Ejercicio 2 -->
        <div class="card operacion-section" id="section2">
            <h2>Ejercicio 2: Operaciones +/-</h2>
            <button onclick="arrancarOperacion()">Calcular Operación</button>
            <div class="result-display operacion" id="resultado">Esperando cálculos...</div>
        </div>

        <!-- Ejercicio 3 -->
        <div class="card metodo-return">
            <h2>Ejercicio 3: Método Return</h2>
            <button onclick="arrancarMetodoReturn()">Ejecutar con Return</button>
            <div class="result-display return" id="resultadoReturn">Esperando resultado...</div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
