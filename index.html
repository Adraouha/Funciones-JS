<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Functions Lab</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #fff;
            color: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5rem 2rem;
            line-height: 1.7;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 300;
            margin-bottom: 4rem;
            letter-spacing: -0.03em;
            text-align: center;
        }

        .main-container {
            width: 100%;
            max-width: 640px;
            display: grid;
            gap: 3rem;
        }

        .card {
            border-bottom: 1px solid #ddd;
            padding: 0 0 3rem 0;
            transition: border-color 0.3s ease;
        }

        .card:last-of-type {
            border-bottom: none;
        }

        .card:hover {
            border-color: #111;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h2::before {
            content: none;
        }

        button {
            background: #111;
            color: #fff;
            border: none;
            padding: 12px 28px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            border-radius: 0;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-bottom: 1.5rem;
            width: fit-content;
        }

        button:hover {
            opacity: 0.7;
        }

        button:active {
            opacity: 0.5;
        }

        .result-display {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 0;
            padding: 1.5rem;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1rem;
            color: #555;
            font-weight: 300;
        }

        #saludar,
        #resultado,
        #resultadoReturn {
            border-left: 2px solid #111;
            transition: all 0.3s ease;
        }

        #saludar:not(:empty),
        #resultado:not(:empty),
        #resultadoReturn:not(:empty) {
            color: #111;
            font-weight: 400;
        }

        .metodo-return {
            border-top: none;
        }

        footer {
            margin-top: 5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        footer p {
            margin-bottom: 0.5rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 3rem 1.5rem;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <h1>Funciones JavaScript - Ejercicios </h1>

    <div class="main-container">
        <!-- Ejercicio 1 -->
        <div class="card section" id="section1">
            <h2>Ejercicio 1: Saludar</h2>
            <button onclick="arrancarSaludar()">Saludar</button>
            <div class="result-display saludar" id="saludar">Aquí aparecerá el resultado...</div>
        </div>

        <!-- Ejercicio 2 -->
        <div class="card operacion-section" id="section2">
            <h2>Ejercicio 2: Operaciones +/-</h2>
            <button onclick="arrancarOperacion()">Calcular</button>
            <div class="result-display operacion" id="resultado">Aquí aparecerá el resultado...</div>
        </div>

        <!-- Ejercicio 3 -->
        <div class="card metodo-return">
            <h2>Ejercicio 3: Método Return</h2>
            <button onclick="arrancarMetodoReturn()">Calcular con Return</button>
            <div class="result-display return" id="resultadoReturn">Aquí aparecerá el resultado...</div>
        </div>
        <footer>
            <p>Ironhack - Funciones JavaScript - HASSAN ADRAOU </p>
        </footer>
    </div>

    <script src="script.js"></script>

</body>

</html>
